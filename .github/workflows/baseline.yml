name: Run Health Condition Engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: pip install numpy pydantic

      # 1️⃣ baseline 생성
      - name: baseline 실행
        run: python baseline.py

      # 2️⃣ condition (score + penalty 포함)
      - name: condition 실행
        run: python condition_engine.py

      # 3️⃣ 파일 확인
      - name: 파일 확인
        run: ls -al

      # 4️⃣ 결과 업로드
      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: health-condition-result
          path: |
            result.json
            condition.json