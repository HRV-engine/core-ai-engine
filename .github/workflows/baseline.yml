name: Run Baseline Engine

on:
  workflow_dispatch:   # 수동 실행 버튼
  push:
    branches: [ main ]  # main에 push 시 실행
  schedule:
    - cron: "0 0 * * *"  # 매일 자정 실행 (UTC 기준)

jobs:
  run-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: |
          pip install numpy pydantic

      - name: baseline 실행
        run: python baseline.py

      - name: 결과 커밋 및 푸시
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add result.json
          git commit -m "update baseline result" || echo "No changes"
          git push
