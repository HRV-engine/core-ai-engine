name: Run Baseline Engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"

jobs:
  run-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: |
          pip install numpy pydantic

      - name: baseline 실행
        run: python baseline.py

      - name: 결과 업로드 (artifact)
        uses: actions/upload-artifact@v3
        with:
          name: baseline-result
          path: result.json