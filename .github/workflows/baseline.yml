name: Run Baseline Engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: pip install numpy pydantic

      - name: baseline 실행
        run: python baseline.py

      - name: score 실행
        run: python score.py

      - name: 파일 확인 (디버그)
        run: ls -al

      - name: 결과 업로드 (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: baseline-result
          path: ./result.json